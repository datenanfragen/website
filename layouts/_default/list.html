{{ define "heading" }}
    {{ if eq .Type "devlog" }}
        {{ T "blog-devlog" }}
    {{ else }}
        {{ T "blog-post" }}
    {{ end }}
{{ end }}

{{ define "main" }}
<main>
    <div class="list-article-columns">
        {{ range .Paginator.Pages }}
        {{ partial "summary.html" . }}
        {{ end }}
    </div>
    {{ partial "pagination.html" . }}
</main>
{{ end }}
